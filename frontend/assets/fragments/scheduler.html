<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="mb-0"><i class="bi bi-calendar-event"></i> Planificador (Buffer)</h4>
  <button class="btn btn-outline-secondary btn-sm" @click="$root.refreshBuffer">
    <i class="bi bi-arrow-clockwise"></i> Actualizar
  </button>
</div>

<div class="row g-3" v-if="$root.bufferItems && $root.bufferItems.length">
  <div class="col-12 col-md-6 col-lg-4" v-for="item in $root.bufferItems" :key="item.id">
    <div class="card h-100 bg-dark border-secondary shadow-sm">
      <div class="card-body p-3">
        <div class="d-flex justify-content-between align-items-start mb-2">
          <h6 class="card-title mb-0 text-truncate">{{ item.task_name }}</h6>
          <span :class="['badge', item.status === 'pending' ? 'bg-warning' : item.status === 'fired' ? 'bg-success' : 'bg-secondary']">
            {{ item.status }}
          </span>
        </div>
        <div class="text-center py-3">
          <div class="h5 mb-0">{{ $root.formatDateTime(item.planned_at) }}</div>
          <div class="small text-secondary">Ejecución Planificada</div>
        </div>
        <div class="d-flex gap-2 mt-3">
          <button class="btn btn-outline-info btn-sm flex-grow-1" @click="$root.triggerTask(item.task_id)">
            <i class="bi bi-play-fill"></i> Forzar Ahora
          </button>
          <button class="btn btn-outline-danger btn-sm" @click="$root.cancelExecution(item.id)">
            <i class="bi bi-x-circle"></i> Cancelar
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="col-12 text-center py-4" v-else-if="$root.bufferItems && $root.bufferItems.length === 0">
  <i class="bi bi-clock-history display-4 text-secondary"></i>
  <p class="text-secondary mt-2">No hay ejecuciones pendientes en el buffer</p>
</div>
<div class="col-12 text-center py-4" v-else>
  <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
</div>
