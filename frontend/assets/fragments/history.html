<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="mb-0"><i class="bi bi-clock-history"></i> Historial de Ejecuciones</h4>
  <button class="btn btn-outline-secondary btn-sm" @click="$root.refreshHistory">
    <i class="bi bi-arrow-clockwise"></i> Actualizar
  </button>
</div>

<div class="table-responsive">
  <table class="table table-dark table-sm table-bordered border-secondary mb-0">
    <thead class="table-secondary">
      <tr>
        <th style="width:180px">Ejecutado</th>
        <th style="width:120px">Duración</th>
        <th>Tarea</th>
        <th>Comando</th>
        <th>Respuesta</th>
      </tr>
    </thead>
    <tbody>
      <tr v-for="item in $root.historyItems" :key="item.id">
        <td class="text-nowrap small">{{ item.executed_at }}</td>
        <td class="text-nowrap small">{{ $root.formatDuration(item.duration) }}</td>
        <td class="small">{{ item.task_name || '—' }}</td>
        <td class="small font-monospace" style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" :title="item.script">{{ item.script }}</td>
        <td class="small font-monospace" style="max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" :title="item.response">{{ item.response || '—' }}</td>
      </tr>
      <tr v-if="!$root.historyItems || $root.historyItems.length === 0">
        <td colspan="5" class="text-center text-secondary py-4">
          <i class="bi bi-inbox display-6 d-block mb-2"></i>
          Sin ejecuciones registradas
        </td>
      </tr>
    </tbody>
  </table>
</div>
